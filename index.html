<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Teessyy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;

background:
radial-gradient(circle at 20% 30%, rgba(255,255,255,0.04), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05), transparent 40%),
linear-gradient(135deg,#0a1a3a,#050d24);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
}

/* stars */

body::before{

content:"";

position:absolute;

width:2px;
height:2px;

background:white;

opacity:0.5;

box-shadow:

40px 60px white,
120px 200px white,
220px 140px white,
320px 300px white,
420px 120px white,
520px 250px white,
620px 80px white,
720px 200px white,
820px 150px white,
920px 270px white,
1020px 120px white,
1120px 320px white;

}

/* moon */

.moon{

position:absolute;

top:80px;
right:120px;

width:90px;
height:90px;

border-radius:50%;

background:

radial-gradient(circle at 30% 30%, #ffffff 0%, #e6ecff 60%, #d6ddff 100%);

box-shadow:

0 0 25px rgba(255,255,255,0.35),
0 0 60px rgba(120,150,255,0.25);

animation:float 6s ease-in-out infinite;

}

/* moon craters */

.moon::after{

content:"";

position:absolute;

width:100%;
height:100%;

border-radius:50%;

background:

radial-gradient(circle at 60% 40%, rgba(0,0,0,0.08) 6%, transparent 7%),
radial-gradient(circle at 35% 65%, rgba(0,0,0,0.07) 8%, transparent 9%),
radial-gradient(circle at 70% 70%, rgba(0,0,0,0.05) 5%, transparent 6%);

}

/* floating motion */

@keyframes float{

0%{ transform:translateY(0); }

50%{ transform:translateY(-6px); }

100%{ transform:translateY(0); }

}

/* shooting star */

.shoot{

position:absolute;

width:2px;
height:2px;

background:white;

opacity:0.7;

top:20%;
left:-50px;

animation:shoot 6s linear infinite;

}

@keyframes shoot{

0%{
transform:translate(0,0);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translate(1000px,300px);
opacity:0;
}

}

/* card */

.card{

backdrop-filter:blur(18px);

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

padding:40px 28px;

border-radius:22px;

box-shadow:

0 15px 40px rgba(0,0,0,0.35);

width:280px;

text-align:center;

animation:fade 1.2s ease;

}

/* title */

h1{

margin:0;

font-weight:500;

letter-spacing:1px;

color:white;

}

/* typing subtitle */

p{

font-size:14px;

opacity:0.65;

margin-top:8px;

color:white;

min-height:20px;

}

/* buttons */

button{

width:100%;

margin-top:14px;

padding:14px;

border:none;

border-radius:40px;

background:linear-gradient(135deg,#4da3ff,#1b66ff);

color:white;

font-size:14px;

letter-spacing:0.5px;

cursor:pointer;

transition:0.25s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 8px 18px rgba(0,0,0,0.35);

}

button:active{

transform:scale(0.97);

}

/* note */

.note{

margin-top:18px;

font-size:12px;

opacity:0.35;

color:white;

}

/* fade */

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>



<body>

<div class="moon"></div>

<div class="shoot"></div>

<div class="card">

<h1>Teessyy</h1>

<p id="typing"></p>

<button onclick="go('Exams.html')">
One
</button>
<button onclick="go('moon.html')">
Two
</button>
<button onclick="go('moon.html')">
Three
</button>

<p class="note">
This is not the end, Wait for it
</p>

</div>



<script>

/* page navigation */

function go(page){

window.location.href=page;

}

/* typing animation */

const text="My moon and my stars, This is for you.";

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,40);

}

}

type();

</script>


</body>

</html>
